<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 | TDGPark 專業資訊與工程服務</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .gradient-text {
            background: linear-gradient(to right, #2563eb, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #mobile-menu { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="sticky top-0 z-50 bg-white shadow-sm border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="font-black text-2xl tracking-tighter text-slate-800">
                TDG<span class="text-blue-600">Park</span>
            </a>
            
            <div class="hidden md:flex items-center space-x-8 text-base font-bold text-slate-600">
                <a href="index.html" class="hover:text-blue-600 transition">首頁</a>
                <a href="services.html" class="hover:text-blue-600 transition">服務項目</a>
                <a href="portfolio.html" class="hover:text-blue-600 transition">實績案例</a>
                <a href="blog.html" class="hover:text-blue-600 transition">實務分享</a>
                <a href="contact.html" class="text-blue-600 border-b-2 border-blue-600 px-1">聯絡方式</a>
            </div>
            
            <button id="menu-btn" class="md:hidden text-slate-600 focus:outline-none p-2 rounded-lg hover:bg-slate-100 transition">
                <i data-lucide="menu" id="icon-menu" class="w-7 h-7"></i>
                <i data-lucide="x" id="icon-close" class="w-7 h-7 hidden"></i>
            </button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-50 shadow-xl overflow-hidden">
            <div class="flex flex-col p-6 space-y-4 font-bold text-slate-600 text-lg">
                <a href="index.html" class="p-3">首頁</a>
                <a href="services.html" class="p-3">服務項目</a>
                <a href="portfolio.html" class="p-3">實績案例</a>
                <a href="blog.html" class="p-3">實務分享</a>
                <a href="contact.html" class="text-blue-600 bg-blue-50 p-3 rounded-xl">聯絡方式</a>
            </div>
        </div>
    </nav>
    
    <header class="bg-slate-900 py-16 text-center text-white relative overflow-hidden">
        <div class="relative z-10 px-4">
            <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-4">聯絡<span class="text-blue-400">諮詢</span></h1>
            <p class="text-slate-400 max-w-2xl mx-auto text-lg leading-relaxed">無論是緊急維修、新居佈線還是機房規劃，我們隨時準備為您服務</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-16">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            
            <div class="lg:col-span-1 space-y-8">
                <div>
                    <h2 class="text-2xl font-bold mb-6 text-slate-800">聯絡管道</h2>
                    <p class="text-slate-500 mb-8">如果您有任何疑問或需求，歡迎mail給我們，。</p>
                </div>

                <div class="space-y-4">
                    <a href="mailto:tdgpark@gmail.com" class="flex items-center p-6 bg-rose-50 rounded-3xl border border-rose-100 hover:shadow-md transition group">
                        <div class="w-12 h-12 bg-rose-500 text-white rounded-2xl flex items-center justify-center mr-4">
                            <i data-lucide="mail" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <div class="text-sm text-rose-600 font-bold uppercase tracking-wider">電子郵件</div>
                            <div class="text-lg font-black text-slate-800">tdgpark@gmail.com</div>
                        </div>
                    </a>
                    
                    <a href="https://line.me" class="flex items-center p-6 bg-emerald-50 rounded-3xl border border-emerald-100 hover:shadow-md transition group">
                        <div class="w-12 h-12 bg-emerald-500 text-white rounded-2xl flex items-center justify-center mr-4">
                            <i data-lucide="message-circle" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <div class="text-sm text-emerald-600 font-bold uppercase tracking-wider">LINE 線上諮詢</div>
                            <div class="text-lg font-black text-slate-800">@tdgpark_studio</div>
                        </div>
                    </a>

                    <a href="tel:09xx-xxx-xxx" class="flex items-center p-6 bg-blue-50 rounded-3xl border border-blue-100 hover:shadow-md transition group">
                        <div class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center mr-4">
                            <i data-lucide="phone" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <div class="text-sm text-blue-600 font-bold uppercase tracking-wider">電話聯絡</div>
                            <div class="text-lg font-black text-slate-800">09xx-xxx-xxx</div>
                        </div>
                    </a>

                    <div class="flex items-center p-6 bg-slate-100 rounded-3xl border border-slate-200">
                        <div class="w-12 h-12 bg-slate-800 text-white rounded-2xl flex items-center justify-center mr-4">
                            <i data-lucide="map-pin" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <div class="text-sm text-slate-500 font-bold uppercase tracking-wider">服務區域</div>
                            <div class="text-lg font-black text-slate-800">嘉義 / 台南</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <h3 class="text-2xl font-bold mb-8 text-slate-800">填寫您的需求</h3>
                    
                    <form action="https://formspree.io/f/你的專屬ID" method="POST" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-600 ml-1">您的姓名 / 稱呼</label>
                                <input type="text" name="姓名" placeholder="例如：林先生" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-600 ml-1">聯絡電話</label>
                                <input type="tel" name="電話" placeholder="例如：0912-345-678" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                            </div>
                        </div>

                        <div class="space-y-4">
                            <label class="text-sm font-bold text-slate-600 ml-1">感興趣的服務內容 (可多選)</label>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                                <label class="flex items-center p-4 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition">
                                    <input type="checkbox" name="需求" value="電腦維修/組裝" class="w-4 h-4 text-blue-600 mr-3">
                                    <span class="text-sm font-bold text-slate-700">電腦維修/組裝</span>
                                </label>
                                <label class="flex items-center p-4 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition">
                                    <input type="checkbox" name="需求" value="網路/Mesh佈線" class="w-4 h-4 text-blue-600 mr-3">
                                    <span class="text-sm font-bold text-slate-700">網路/Mesh佈線</span>
                                </label>
                                <label class="flex items-center p-4 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition">
                                    <input type="checkbox" name="需求" value="機房理線/資安" class="w-4 h-4 text-blue-600 mr-3">
                                    <span class="text-sm font-bold text-slate-700">機房理線/資安</span>
                                </label>
                                <label class="flex items-center p-4 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition">
                                    <input type="checkbox" name="需求" value="監控系統安裝" class="w-4 h-4 text-blue-600 mr-3">
                                    <span class="text-sm font-bold text-slate-700">監控系統安裝</span>
                                </label>
                                <label class="flex items-center p-4 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition">
                                    <input type="checkbox" name="需求" value="水電/弱電整合" class="w-4 h-4 text-blue-600 mr-3">
                                    <span class="text-sm font-bold text-slate-700">水電/弱電整合</span>
                                </label>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-600 ml-1">問題描述或特殊需求</label>
                            <textarea name="詳細內容" rows="4" placeholder="請簡述您的情況..." class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition"></textarea>
                        </div>

                        <button type="submit" class="w-full py-5 bg-blue-600 text-white font-black text-lg rounded-2xl shadow-lg hover:bg-blue-700 hover:-translate-y-1 transition transform active:scale-95">
                            送出諮詢申請
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center text-slate-400 text-sm border-t border-slate-200 bg-white">
        <div class="font-black text-xl text-slate-700 mb-2">TDG<span class="text-blue-600">Park</span></div>
        &copy; 2023 TDGPark Technology Studio. All rights reserved.
    </footer>

    <script>
        lucide.createIcons();
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');
        const iconMenu = document.getElementById('icon-menu');
        const iconClose = document.getElementById('icon-close');

        // 修復：點擊選單開關邏輯
        btn.addEventListener('click', () => {
            const isHidden = menu.classList.contains('hidden');
            if (isHidden) {
                menu.classList.remove('hidden');
                iconMenu.classList.add('hidden');
                iconClose.classList.remove('hidden');
            } else {
                menu.classList.add('hidden');
                iconMenu.classList.remove('hidden');
                iconClose.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
